version: '3.9'

services:
  postgres:
    image: postgres:17
    container_name: benchmark-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: benchmark
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d benchmark"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:8
    container_name: benchmark-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: benchmark
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongo_data: